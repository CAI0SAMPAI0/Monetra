<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Monetra</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="static/css/styles.css">
    <style>
        body {
            background-color: #080808;
            color: #F1F5F9;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col font-sans">

    <!-- Navbar Placeholder -->
    <div id="navbar-placeholder"></div>

    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8 bg-bg-secondary border border-bg-tertiary p-8 rounded-2xl shadow-xl">
            <div class="text-center">
                <h2 class="text-3xl font-extrabold text-white">Acesse sua conta</h2>
                <p class="mt-2 text-sm text-text-secondary">
                    Ou <a href="signup.html" class="font-medium text-accent-500 hover:text-accent-600">crie uma nova
                        conta gratuitamente</a>
                </p>
            </div>
            <form id="login-form" method="POST" class="mt-8 space-y-6">
                <div class="space-y-4">
                    <div>
                        <label for="email" class="block text-sm font-medium text-text-secondary mb-1">E-mail</label>
                        <input id="email" name="email" type="email" autocomplete="email" required
                            class="w-full px-4 py-3 bg-bg-secondary border border-bg-tertiary rounded-lg text-text-primary focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all duration-200"
                            placeholder="seuemail@exemplo.com">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-text-secondary mb-1">Senha</label>
                        <input id="password" name="password" type="password" autocomplete="current-password" required
                            class="w-full px-4 py-3 bg-bg-secondary border border-bg-tertiary rounded-lg text-text-primary focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all duration-200"
                            placeholder="Sua senha">
                    </div>
                </div>

                <div id="error-message" class="text-error text-sm font-bold hidden"></div>

                <div>
                    <button type="submit"
                        class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-lg text-[#080808] bg-accent-500 hover:bg-accent-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-accent-500 transition-all duration-200">
                        Entrar
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="static/js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Check if already authenticated, redirects if so
            await checkAuthAndSetup(false);

            const loginForm = document.getElementById('login-form');
            const errorDiv = document.getElementById('error-message');

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorDiv.classList.add('hidden');

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                try {
                    const response = await fetch(`${BACKEND_URL}/api/auth/login/`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ email, password }),
                        credentials: 'include'
                    });

                    const data = await response.json();

                    if (response.ok) {
                        showToast('Login realizado com sucesso!');
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1000);
                    } else {
                        errorDiv.textContent = data.error || 'Falha ao realizar login.';
                        errorDiv.classList.remove('hidden');
                    }
                } catch (err) {
                    console.error('Login error:', err);
                    errorDiv.textContent = 'Erro ao se conectar ao servidor backend.';
                    errorDiv.classList.remove('hidden');
                }
            });
        });
    </script>
</body>

</html>
