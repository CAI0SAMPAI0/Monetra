<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Categorias - Monetra</title>
    <link rel="shortcut icon" href="/static/images/logo1.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        body {
            background-color: #080808;
            color: #F1F5F9;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">
    
    <!-- Navbar Placeholder -->
    <div id="navbar-placeholder"></div>

    <main class="flex-grow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            
            <div class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div>
                    <h1 class="text-3xl font-bold text-white">Minhas Categorias</h1>
                    <p class="text-text-secondary">Organize suas transações por tipo e cor.</p>
                </div>
                <a href="category_form.html" class="px-4 py-2 bg-gradient-to-r from-primary-500 to-accent-500 text-white rounded-lg font-medium hover:opacity-90 transition-all duration-200 shadow-lg flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    Nova Categoria
                </a>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Income Categories -->
                <div>
                    <h2 class="text-xl font-bold text-success mb-4 flex items-center gap-2">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 11l5-5m0 0l5 5m-5-5v12"></path>
                        </svg>
                        Entradas
                    </h2>
                    <div class="bg-bg-secondary rounded-xl shadow-lg border border-bg-tertiary overflow-hidden">
                        <div id="income-categories-list" class="divide-y divide-bg-tertiary">
                            <div class="p-8 text-center text-text-muted text-sm">Carregando categorias...</div>
                        </div>
                    </div>
                </div>

                <!-- Expense Categories -->
                <div>
                    <h2 class="text-xl font-bold text-error mb-4 flex items-center gap-2">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 13l-5 5m0 0l-5-5m5 5V6"></path>
                        </svg>
                        Saídas
                    </h2>
                    <div class="bg-bg-secondary rounded-xl shadow-lg border border-bg-tertiary overflow-hidden">
                        <div id="expense-categories-list" class="divide-y divide-bg-tertiary">
                            <div class="p-8 text-center text-text-muted text-sm">Carregando categorias...</div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="/static/js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuthAndSetup(true);
            if (!user) return;

            const incomeList = document.getElementById('income-categories-list');
            const expenseList = document.getElementById('expense-categories-list');

            async function loadCategories() {
                try {
                    const res = await fetch(`${BACKEND_URL}/api/categories/`, { credentials: 'include' });
                    if (!res.ok) throw new Error();
                    const categories = await res.json();

                    const incomes = categories.filter(c => c.category_type === 'INCOME');
                    const expenses = categories.filter(c => c.category_type === 'EXPENSE');

                    // Render Incomes
                    if (incomes.length === 0) {
                        incomeList.innerHTML = `<div class="p-8 text-center text-text-muted text-sm">Nenhuma categoria de entrada cadastrada.</div>`;
                    } else {
                        incomeList.innerHTML = incomes.map(cat => `
                            <div class="p-4 flex items-center justify-between hover:bg-bg-tertiary transition-all duration-150">
                                <div class="flex items-center gap-3">
                                    <div class="w-4 h-4 rounded-full shadow-sm" style="background-color: ${cat.color || '#2EC47D'}"></div>
                                    <span class="text-text-primary font-medium">${escapeHTML(cat.name)}</span>
                                </div>
                                <div class="flex gap-2">
                                    <a href="category_form.html?id=${cat.id}" class="p-2 text-text-secondary hover:text-accent-500 transition-colors">
                                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                                        </svg>
                                    </a>
                                    <a href="category_confirm_delete.html?id=${cat.id}" class="p-2 text-text-secondary hover:text-error transition-colors">
                                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                        </svg>
                                    </a>
                                </div>
                            </div>
                        `).join('');
                    }

                    // Render Expenses
                    if (expenses.length === 0) {
                        expenseList.innerHTML = `<div class="p-8 text-center text-text-muted text-sm">Nenhuma categoria de saída cadastrada.</div>`;
                    } else {
                        expenseList.innerHTML = expenses.map(cat => `
                            <div class="p-4 flex items-center justify-between hover:bg-bg-tertiary transition-all duration-150">
                                <div class="flex items-center gap-3">
                                    <div class="w-4 h-4 rounded-full shadow-sm" style="background-color: ${cat.color || '#EF3823'}"></div>
                                    <span class="text-text-primary font-medium">${escapeHTML(cat.name)}</span>
                                </div>
                                <div class="flex gap-2">
                                    <a href="category_form.html?id=${cat.id}" class="p-2 text-text-secondary hover:text-accent-500 transition-colors">
                                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                                        </svg>
                                    </a>
                                    <a href="category_confirm_delete.html?id=${cat.id}" class="p-2 text-text-secondary hover:text-error transition-colors">
                                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                        </svg>
                                    </a>
                                </div>
                            </div>
                        `).join('');
                    }

                } catch (e) {
                    showToast('Erro ao carregar categorias.', 'error');
                }
            }

            function escapeHTML(str) {
                return str.replace(/[&<>'"]/g, tag => ({
                    '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
                }[tag] || tag));
            }

            await loadCategories();
        });
    </script>
</body>
</html>
