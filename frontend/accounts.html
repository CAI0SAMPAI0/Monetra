<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Contas - Monetra</title>
    <link rel="shortcut icon" href="static/images/logo1.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="static/css/styles.css">
    <style>
        body {
            background-color: #080808;
            color: #F1F5F9;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">
    
    <!-- Navbar Placeholder -->
    <div id="navbar-placeholder"></div>

    <main class="flex-grow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            
            <div class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div>
                    <h1 class="text-3xl font-bold text-white">Minhas Contas</h1>
                    <p class="text-text-secondary">Gerencie suas contas bancárias e saldos.</p>
                </div>
                <a href="account_form.html" class="px-4 py-2 bg-gradient-to-r from-primary-500 to-accent-500 text-white rounded-lg font-medium hover:opacity-90 transition-all duration-200 shadow-lg flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    Nova Conta
                </a>
            </div>

            <!-- Total Balance Card -->
            <div class="bg-gradient-to-br from-primary-500 to-accent-500 rounded-xl p-6 shadow-xl mb-8 max-w-sm">
                <span class="text-white/80 text-sm font-medium">Saldo Total Consolidado</span>
                <p id="total-balance" class="text-3xl font-bold text-white mt-1">R$ 0,00</p>
            </div>

            <!-- Grid Container -->
            <div id="accounts-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="text-center text-text-muted text-sm py-12 md:col-span-2 lg:col-span-3">Carregando contas...</div>
            </div>

        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="static/js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuthAndSetup(true);
            if (!user) return;

            const grid = document.getElementById('accounts-grid');
            const totalBalanceEl = document.getElementById('total-balance');

            async function loadAccounts() {
                try {
                    const res = await fetch(`${BACKEND_URL}/api/accounts/`, { credentials: 'include' });
                    if (!res.ok) throw new Error();
                    const accounts = await res.json();

                    // Calculate total balance
                    let total = 0;
                    accounts.forEach(acc => {
                        if (acc.is_active) total += acc.balance;
                    });
                    totalBalanceEl.textContent = `R$ ${total.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;

                    if (accounts.length === 0) {
                        grid.innerHTML = `
                            <div class="md:col-span-2 lg:col-span-3 bg-bg-secondary rounded-xl p-12 shadow-lg border border-bg-tertiary text-center">
                                <p class="text-text-muted mb-6">Você ainda não possui nenhuma conta cadastrada.</p>
                                <a href="account_form.html" class="inline-block px-6 py-3 bg-gradient-to-r from-primary-500 to-accent-500 text-white rounded-lg font-bold hover:opacity-90 transition-all duration-200 shadow-lg">
                                    Criar Minha Primeira Conta
                                </a>
                            </div>
                        `;
                    } else {
                        grid.innerHTML = accounts.map(acc => `
                            <div class="bg-bg-secondary rounded-xl p-6 shadow-lg border border-bg-tertiary hover:border-accent-500 transition-all duration-200 flex flex-col">
                                <div class="flex items-start justify-between mb-4">
                                    <div>
                                        <h3 class="text-xl font-bold text-white">${escapeHTML(acc.name)}</h3>
                                        <p class="text-text-muted text-sm">${escapeHTML(acc.bank_name)} • ${acc.account_type_display}</p>
                                    </div>
                                    <span class="px-2 py-1 ${acc.is_active ? 'bg-success/10 text-success' : 'bg-text-muted/10 text-text-muted'} rounded text-xs font-bold uppercase">
                                        ${acc.is_active ? 'Ativa' : 'Inativa'}
                                    </span>
                                </div>
                                
                                <div class="mt-auto pt-6 border-t border-bg-tertiary flex items-end justify-between">
                                    <div>
                                        <span class="text-text-muted text-xs block mb-1">Saldo Atual</span>
                                        <p class="text-2xl font-bold text-text-primary">R$ ${acc.balance.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</p>
                                    </div>
                                    <div class="flex gap-2">
                                        <a href="account_form.html?id=${acc.id}" class="p-2 text-text-secondary hover:text-accent-500 transition-colors">
                                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                                            </svg>
                                        </a>
                                        <a href="account_confirm_delete.html?id=${acc.id}" class="p-2 text-text-secondary hover:text-error transition-colors">
                                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                            </svg>
                                        </a>
                                    </div>
                                </div>
                            </div>
                        `).join('');
                    }
                } catch (e) {
                    showToast('Erro ao carregar contas.', 'error');
                }
            }

            function escapeHTML(str) {
                return str.replace(/[&<>'"]/g, tag => ({
                    '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
                }[tag] || tag));
            }

            await loadAccounts();
        });
    </script>
</body>
</html>
