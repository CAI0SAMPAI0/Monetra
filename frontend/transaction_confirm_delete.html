<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excluir Transação - Monetra</title>
    <link rel="shortcut icon" href="static/images/logo1.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="static/css/styles.css">
    <style>
        body {
            background-color: #080808;
            color: #F1F5F9;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">
    
    <!-- Navbar Placeholder -->
    <div id="navbar-placeholder"></div>

    <main class="flex-grow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            
            <div class="max-w-md mx-auto">
                <div class="bg-bg-secondary rounded-2xl border border-bg-tertiary p-8 shadow-xl text-center">
                    <div class="w-20 h-20 bg-error/10 rounded-full flex items-center justify-center mx-auto mb-6">
                        <svg class="w-10 h-10 text-error" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                        </svg>
                    </div>
                    
                    <h1 class="text-2xl font-bold text-white mb-4">Excluir Transação?</h1>
                    <p class="text-text-secondary mb-8">
                        Você tem certeza que deseja excluir a transação <span id="transaction-desc" class="text-white font-semibold">"..."</span> no valor de <span id="transaction-amount" class="text-white font-semibold">R$ 0,00</span>? Esta ação irá atualizar o saldo da conta e não pode ser desfeita.
                    </p>

                    <form id="delete-form">
                        <div class="flex flex-col space-y-3">
                            <button type="submit" class="w-full py-3 rounded-xl text-white bg-error hover:bg-red-700 transition-all font-bold shadow-lg">
                                Sim, Excluir Transação
                            </button>
                            <a href="transactions.html" class="w-full py-3 rounded-xl text-text-secondary hover:text-white hover:bg-bg-tertiary transition-all">
                                Não, Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="static/js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuthAndSetup(true);
            if (!user) return;

            const urlParams = new URLSearchParams(window.location.search);
            const transactionId = urlParams.get('id');

            if (!transactionId) {
                showToast('Transação não especificada.', 'error');
                setTimeout(() => { window.location.href = 'transactions.html'; }, 1000);
                return;
            }

            const descSpan = document.getElementById('transaction-desc');
            const amountSpan = document.getElementById('transaction-amount');
            const form = document.getElementById('delete-form');

            function formatCurrency(val) {
                return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
            }

            function escapeHTML(str) {
                if (str === null || str === undefined) return '';
                return String(str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            // Fetch transaction details
            try {
                const response = await fetch(`${BACKEND_URL}/api/transactions/${transactionId}/`, { credentials: 'include' });
                if (!response.ok) throw new Error('Transação não encontrada');
                const t = await response.json();

                descSpan.textContent = `"${t.description || 'sem descrição'}"`;
                amountSpan.textContent = formatCurrency(t.amount);
            } catch (err) {
                console.error(err);
                showToast('Erro ao carregar detalhes da transação.', 'error');
                setTimeout(() => { window.location.href = 'transactions.html'; }, 2000);
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                try {
                    const csrfToken = await fetchCSRFToken();
                    const response = await fetch(`${BACKEND_URL}/api/transactions/${transactionId}/`, {
                        method: 'DELETE',
                        headers: {
                            'X-CSRFToken': csrfToken
                        },
                        credentials: 'include'
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || 'Falha ao deletar transação');
                    }

                    showToast('Transação excluída com sucesso!');
                    setTimeout(() => { window.location.href = 'transactions.html'; }, 1000);

                } catch (err) {
                    console.error(err);
                    showToast(err.message, 'error');
                }
            });
        });
    </script>
</body>
</html>
