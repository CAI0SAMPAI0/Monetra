<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Monetra</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="static/css/styles.css">
    <style>
        body {
            background-color: #080808;
            color: #F1F5F9;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">
    
    <!-- Navbar Placeholder -->
    <div id="navbar-placeholder"></div>

    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8 bg-bg-secondary border border-bg-tertiary p-8 rounded-2xl shadow-xl">
            <div class="text-center">
                <h2 class="text-3xl font-extrabold text-white">Seu Perfil</h2>
                <p class="mt-2 text-sm text-text-secondary">Visualizar e editar suas informações pessoais.</p>
            </div>
            
            <form id="profile-form" class="mt-8 space-y-6">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-text-secondary mb-1">E-mail (Login)</label>
                        <input id="email" type="email" disabled 
                            class="w-full px-4 py-3 bg-bg-tertiary border border-bg-tertiary rounded-lg text-text-secondary cursor-not-allowed opacity-75">
                    </div>
                    <div>
                        <label for="full_name" class="block text-sm font-medium text-text-secondary mb-1">Nome Completo</label>
                        <input id="full_name" name="full_name" type="text" required 
                            class="w-full px-4 py-3 bg-bg-secondary border border-bg-tertiary rounded-lg text-text-primary focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all" 
                            placeholder="Seu nome completo">
                    </div>
                    <div>
                        <label for="phone" class="block text-sm font-medium text-text-secondary mb-1">Telefone</label>
                        <input id="phone" name="phone" type="text" 
                            class="w-full px-4 py-3 bg-bg-secondary border border-bg-tertiary rounded-lg text-text-primary focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all" 
                            placeholder="(00) 00000-0000">
                    </div>
                </div>

                <div>
                    <button type="submit" 
                        class="w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-lg text-[#080808] bg-accent-500 hover:bg-accent-600 focus:outline-none transition-all duration-200 shadow-md">
                        Salvar Alterações
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="static/js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuthAndSetup(true);
            if (!user) return;

            const emailInput = document.getElementById('email');
            const nameInput = document.getElementById('full_name');
            const phoneInput = document.getElementById('phone');
            const profileForm = document.getElementById('profile-form');

            // Load profile data
            async function loadProfile() {
                try {
                    const res = await fetch(`${BACKEND_URL}/api/profile/`, { credentials: 'include' });
                    if (!res.ok) throw new Error();
                    const profile = await res.json();

                    emailInput.value = profile.email;
                    nameInput.value = profile.full_name || '';
                    phoneInput.value = profile.phone || '';
                } catch (e) {
                    showToast('Erro ao carregar informações de perfil.', 'error');
                }
            }

            await loadProfile();

            // Submit form handler
            profileForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const bodyData = {
                    full_name: nameInput.value.trim(),
                    phone: phoneInput.value.trim()
                };

                try {
                    const csrfToken = await fetchCSRFToken();
                    const res = await fetch(`${BACKEND_URL}/api/profile/`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': csrfToken
                        },
                        body: JSON.stringify(bodyData),
                        credentials: 'include'
                    });

                    if (res.ok) {
                        showToast('Perfil atualizado com sucesso!');
                        await loadProfile();
                    } else {
                        const error = await res.json();
                        showToast(error.error || 'Erro ao atualizar perfil.', 'error');
                    }
                } catch (err) {
                    showToast('Erro ao atualizar perfil.', 'error');
                }
            });
        });
    </script>
</body>
</html>
