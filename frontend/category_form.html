<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Categoria - Monetra</title>
    <link rel="shortcut icon" href="/static/images/logo1.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        body {
            background-color: #080808;
            color: #F1F5F9;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">
    
    <!-- Navbar Placeholder -->
    <div id="navbar-placeholder"></div>

    <main class="flex-grow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            
            <div class='max-w-3xl mx-auto'>
                <div class='mb-8'>
                    <h1 id="form-title" class='text-3xl font-bold text-white'>Nova Categoria</h1>
                    <p id="form-subtitle" class='text-text-secondary'>Cadastre uma nova categoria para suas transações.</p>
                </div>

                <div class='bg-bg-secondary rounded-2xl shadow-lg border border-bg-tertiary overflow-hidden'>
                    <form id="category-form" class='p-8 space-y-6'>
                        
                        <div id="error-message" class='hidden bg-error/10 border border-error/20 rounded-lg p-4 text-error text-sm'>
                            <!-- Dynamic errors will go here -->
                        </div>

                        <div class='grid grid-cols-1 md:grid-cols-2 gap-6'>
                            <div class='md:col-span-2'>
                                <label for='id_name' class='block text-text-secondary text-sm font-medium mb-2'>
                                    Nome
                                </label>
                                <input type='text' name='name' id='id_name'
                                       class='w-full px-4 py-3 bg-bg-primary border border-bg-tertiary rounded-lg text-text-primary focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all duration-200'
                                       required>
                            </div>

                            <div>
                                <label for='id_category_type' class='block text-text-secondary text-sm font-medium mb-2'>
                                    Tipo de Categoria
                                </label>
                                <select name='category_type' id='id_category_type' 
                                        class='w-full px-4 py-3 bg-bg-primary border border-bg-tertiary rounded-lg text-text-primary focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all duration-200'>
                                    <option value='INCOME'>Receita</option>
                                    <option value='EXPENSE'>Despesa</option>
                                </select>
                            </div>

                            <div>
                                <label for='id_color' class='block text-text-secondary text-sm font-medium mb-2'>
                                    Cor
                                </label>
                                <div class='flex items-center gap-3'>
                                    <input type='color' name='color' id='id_color' 
                                           class='w-12 h-12 bg-bg-primary border border-bg-tertiary rounded cursor-pointer p-1'
                                           value='#667eea'>
                                    <span class='text-text-muted text-sm'>Escolha uma cor para identificar esta categoria.</span>
                                </div>
                            </div>
                        </div>

                        <div class='mt-10 pt-6 border-t border-bg-tertiary flex justify-end gap-4'>
                            <a href='categories.html' class='px-6 py-3 bg-bg-tertiary text-text-primary rounded-lg font-bold hover:bg-bg-primary transition-all duration-200 border border-bg-tertiary'>
                                Cancelar
                            </a>
                            <button type='submit' id="submit-btn" class='px-6 py-3 bg-gradient-to-r from-primary-500 to-accent-500 text-white rounded-lg font-bold hover:opacity-90 transition-all duration-200 shadow-lg'>
                                Criar Categoria
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="/static/js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuthAndSetup(true);
            if (!user) return;

            const urlParams = new URLSearchParams(window.location.search);
            const categoryId = urlParams.get('id');

            const formTitle = document.getElementById('form-title');
            const formSubtitle = document.getElementById('form-subtitle');
            const submitBtn = document.getElementById('submit-btn');
            const form = document.getElementById('category-form');
            const nameInput = document.getElementById('id_name');
            const typeInput = document.getElementById('id_category_type');
            const colorInput = document.getElementById('id_color');
            const errorDiv = document.getElementById('error-message');

            if (categoryId) {
                // Editing mode
                formTitle.textContent = 'Editar Categoria';
                formSubtitle.textContent = 'Atualize os dados da sua categoria.';
                submitBtn.textContent = 'Salvar Alterações';
                document.title = 'Editar Categoria - Monetra';

                // Fetch current values
                try {
                    const response = await fetch(`${BACKEND_URL}/api/categories/${categoryId}/`, { credentials: 'include' });
                    if (!response.ok) throw new Error('Categoria não encontrada');
                    const category = await response.json();
                    
                    nameInput.value = category.name;
                    typeInput.value = category.category_type;
                    colorInput.value = category.color || '#667eea';
                } catch (err) {
                    console.error(err);
                    showToast('Erro ao carregar detalhes da categoria.', 'error');
                    setTimeout(() => { window.location.href = 'categories.html'; }, 2000);
                }
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorDiv.classList.add('hidden');
                errorDiv.textContent = '';

                const bodyData = {
                    name: nameInput.value.trim(),
                    category_type: typeInput.value,
                    color: colorInput.value
                };

                const method = categoryId ? 'PUT' : 'POST';
                const endpoint = categoryId ? `${BACKEND_URL}/api/categories/${categoryId}/` : `${BACKEND_URL}/api/categories/`;

                try {
                    const csrfToken = await fetchCSRFToken();
                    const response = await fetch(endpoint, {
                        method: method,
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': csrfToken
                        },
                        body: JSON.stringify(bodyData),
                        credentials: 'include'
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || 'Falha ao salvar categoria');
                    }

                    showToast(categoryId ? 'Categoria atualizada com sucesso!' : 'Categoria criada com sucesso!');
                    setTimeout(() => { window.location.href = 'categories.html'; }, 1000);

                } catch (err) {
                    console.error(err);
                    errorDiv.textContent = err.message;
                    errorDiv.classList.remove('hidden');
                    showToast(err.message, 'error');
                }
            });
        });
    </script>
</body>
</html>
