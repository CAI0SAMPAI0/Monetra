<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transações - Monetra</title>
    <link rel="shortcut icon" href="static/images/logo1.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="static/css/styles.css">
    <style>
        body {
            background-color: #080808;
            color: #F1F5F9;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">
    
    <!-- Navbar Placeholder -->
    <div id="navbar-placeholder"></div>

    <main class="flex-grow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            
            <div class="max-w-6xl mx-auto">
                <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-8 gap-4">
                    <div>
                        <h1 class="text-3xl font-bold text-white mb-2">Transações</h1>
                        <p class="text-text-secondary">Gerencie suas entradas e saídas</p>
                    </div>
                    <div class="mt-4 md:mt-0">
                        <a href="transaction_form.html" class="inline-flex items-center px-6 py-3 text-base font-medium rounded-xl text-white bg-gradient-to-r from-primary-500 to-accent-500 hover:opacity-90 transition-all shadow-lg">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                            </svg>
                            Nova Transação
                        </a>
                    </div>
                </div>

                <div class="bg-bg-secondary rounded-2xl border border-bg-tertiary overflow-hidden shadow-xl mb-8">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-bg-tertiary text-text-secondary uppercase text-xs font-semibold tracking-wider">
                                    <th class="px-6 py-4">Data</th>
                                    <th class="px-6 py-4">Descrição</th>
                                    <th class="px-6 py-4">Categoria</th>
                                    <th class="px-6 py-4">Conta</th>
                                    <th class="px-6 py-4">Valor</th>
                                    <th class="px-6 py-4 text-center">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="transactions-table-body" class="divide-y divide-bg-tertiary">
                                <tr>
                                    <td colspan="6" class="px-6 py-12 text-center text-text-muted italic">
                                        Carregando transações...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="static/js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuthAndSetup(true);
            if (!user) return;

            const tbody = document.getElementById('transactions-table-body');

            // Currency formatter helper
            function formatCurrency(val) {
                return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
            }

            function formatDate(dateStr) {
                const date = new Date(dateStr + 'T00:00:00');
                return date.toLocaleDateString('pt-BR');
            }

            function escapeHTML(str) {
                if (str === null || str === undefined) return '';
                return String(str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            async function loadTransactions() {
                try {
                    const res = await fetch(`${BACKEND_URL}/api/transactions/`, { credentials: 'include' });
                    if (!res.ok) throw new Error();
                    const transactions = await res.json();

                    if (transactions.length === 0) {
                        tbody.innerHTML = `
                            <tr>
                                <td colspan="6" class="px-6 py-12 text-center text-text-muted italic">
                                    Nenhuma transação encontrada.
                                </td>
                            </tr>
                        `;
                    } else {
                        tbody.innerHTML = transactions.map(t => {
                            const valueClass = t.transaction_type === 'INCOME' ? 'text-success' : 'text-error';
                            const valuePrefix = t.transaction_type === 'INCOME' ? '+' : '-';
                            const color = t.category.color || '#D4AF37';
                            return `
                                <tr class="hover:bg-bg-tertiary/50 transition-colors">
                                    <td class="px-6 py-4 text-text-secondary text-sm">${formatDate(t.transaction_date)}</td>
                                    <td class="px-6 py-4 text-white font-medium">${escapeHTML(t.description || 'Sem descrição')}</td>
                                    <td class="px-6 py-4">
                                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium" style="background-color: ${color}20; color: ${color}">
                                            ${escapeHTML(t.category.name)}
                                        </span>
                                    </td>
                                    <td class="px-6 py-4 text-text-muted text-sm">${escapeHTML(t.account.name)}</td>
                                    <td class="px-6 py-4 font-bold ${valueClass}">
                                        ${valuePrefix} ${formatCurrency(t.amount)}
                                    </td>
                                    <td class="px-6 py-4 text-center">
                                        <div class="flex items-center justify-center space-x-3">
                                            <a href="transaction_form.html?id=${t.id}" class="text-text-secondary hover:text-white transition-colors">
                                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                                                </svg>
                                            </a>
                                            <a href="transaction_confirm_delete.html?id=${t.id}" class="text-text-secondary hover:text-error transition-colors">
                                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                                </svg>
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                            `;
                        }).join('');
                    }
                } catch (e) {
                    showToast('Erro ao carregar histórico de transações.', 'error');
                }
            }

            await loadTransactions();
        });
    </script>
</body>
</html>
